version: "3.9"

services:
  db:
    image: ${DB_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ebs-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s 

  backend-api:
    image: ${REGISTRY}/cicd-final-project/${IMAGE_NAME}:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SERVER_PORT: ${CONTAINER_PORT}
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    networks:
      - ebs-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${CONTAINER_PORT}/api/auth/login"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  db_data:
    driver: local

networks:
  ebs-network:
    driver: bridge